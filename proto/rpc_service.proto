syntax = "proto3";  //语法版本

package rpc;   //命名空间 

message RpcRequest {
    bytes payload = 1;
    map<string, string> metadata = 2;
}

message RpcResponse {
    bool success   = 1;
    bytes payload  = 2;
    string error_msg = 3;
}

message Heartbeat {
    string service_name = 1;
    string node_id      = 2;
    int64 timestamp     = 3;
    map<string, string> extra = 4;
}

message ServiceRegister {
    string service_name = 1;
    string node_id      = 2;
    string host         = 3;
    int32 port          = 4;
    map<string, string> tags = 5;
}

message ServiceDiscover {
    string service_name = 1;
}

message ServiceNode {
    string node_id = 1;
    string host    = 2;
    int32 port     = 3;
    map<string, string> tags = 4;
}

message ServiceDiscoverResult {
    repeated ServiceNode nodes = 1;
}

message EchoRequest {
    string message = 1;
}

message EchoResponse {
    string message = 1;
}
